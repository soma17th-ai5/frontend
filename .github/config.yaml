# Gemini Code Reviewer Configuration

model:
  name: "gemini-2.5-flash" # 또는 현재 사용하는 모델명
  temperature: 0.2 # 창의성보다는 일관되고 엄격한 리뷰를 위해 낮게 설정
  max_output_tokens: 2048

review_settings:
  language: "ko-KR"
  tone: "professional, constructive, and precise"
  focus_areas:
    - "Architecture & Pattern Compliance"
    - "React/Next.js Best Practices"
    - "Performance & Rendering Optimization"
    - "Error Handling & Edge Cases"
    - "UX/UI Consistency"

file_filters:
  include:
    - "**/*.ts"
    - "**/*.tsx"
  exclude:
    - "node_modules/**"
    - ".next/**"
    - "dist/**"
    - "**/*.test.ts"
    - "**/*.stories.tsx"

prompt_injection:
  system_instruction: |
    당신은 꼼꼼하고 논리적인 시니어 프론트엔드 개발자입니다.
    제공된 `styleguide.md`의 규칙을 엄격하게 적용하여 코드 리뷰를 진행하세요.
    단순한 문법 오류 지적을 넘어, 사용자 경험(UX)을 저해할 수 있는 요소나 
    불필요한 렌더링, 상태 관리의 구조적 문제를 논리적으로 짚어주세요.
    개선 코드를 제안할 때는 반드시 그 이유를 명확히 설명해야 합니다.
